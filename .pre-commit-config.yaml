minimum_pre_commit_version: 3.2.0 # necessitated by Lucas-C's hooks
default_install_hook_types: [pre-commit, pre-push]
exclude: "thirdParty"
repos:
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v20.1.8
  hooks:
  - id: clang-format
    files: \.(cpp|hpp)
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: no-commit-to-branch
    args: [-b, develop]
  - id: check-merge-conflict
  - id: trailing-whitespace
    exclude_types: [markdown, rst]
  - id: end-of-file-fixer
  - id: check-toml
  - id: check-yaml
  - id: mixed-line-ending
  - id: check-executables-have-shebangs
  - id: check-shebang-scripts-are-executable
- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.5
  hooks:
    - id: forbid-tabs
      types_or: [file]
      exclude_types: [rst]
    - id: remove-tabs
      types_or: [file]
      exclude_types: [rst]
    - id: forbid-crlf
    - id: remove-crlf
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.10
  hooks:
    - id: ruff
      types_or: [ python, pyi, jupyter ]
      # The ignores in here are chosen to conform with the currently
      # existing code and not motivated any other way.
      args: [ --fix, --ignore, "F403,F405,E731"]
    - id: ruff-format
      types_or: [python, pyi, jupyter]
      args: ["--line-length", "120"]
- repo: https://github.com/jumanjihouse/pre-commit-hooks
  rev: 3.0.0
  hooks:
    - id: require-ascii
      exclude_types: [rst]
      exclude: CHANGELOG.md|.zenodo.json
- repo: https://github.com/BlankSpruce/gersemi
  rev: 0.22.1
  hooks:
    - id: gersemi
      args: [--no-warn-about-unknown-commands]
- repo: https://github.com/tox-dev/pyproject-fmt
  rev: "v2.5.0"
  hooks:
    - id: pyproject-fmt
