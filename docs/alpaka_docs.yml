name: alpaka_docs

channels:
  - conda-forge

dependencies:
  # Core Python - choose the version you need
  - python >=3.9,<3.13        # adjust as required

  # ---------------------------------------------------------
  # Sphinx and documentation tooling
  # ---------------------------------------------------------
  - sphinx
  - sphinx_rtd_theme
  - breathe
  - sphinxcontrib-programoutput
  - sphinxcontrib-doxylink

  # ---------------------------------------------------------
  # Miscellaneous utilities
  # ---------------------------------------------------------
  - pygments
  - jinja2
  - markupsafe
  - rst2pdf

  # ---------------------------------------------------------
  # Optional scientific / plotting stack (currently commented)
  # ---------------------------------------------------------
